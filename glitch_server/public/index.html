<!DOCTYPE html>
<html>
<head>
  <title>Love App</title>
  <style>
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff4d6d,#ffb6c1);height:100vh;display:flex;justify-content:center;align-items:center;color:white}
    .card{text-align:center;padding:60px;border-radius:35px;background:rgba(255,255,255,.18);box-shadow:0 10px 30px rgba(0,0,0,.15)}
    input{padding:18px 40px;border-radius:30px;border:0;text-align:center;font-size:18px}
    button{padding:16px 35px;border-radius:30px;border:0;margin:18px;font-weight:bold;cursor:pointer;font-size:18px}
    .yes{background:#ff2e63;color:white}.no{background:#333;color:white}.primary{color:#ff2e63}
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>💖 Enter Your Name</h1>
    <input id="name" placeholder="Your name..." />
    <br><br>
    <button class="primary" id="continueBtn">Continue ➜</button>
  </div>

<script>
document.getElementById("continueBtn").addEventListener("click", next);

function next(){
  var name = document.getElementById("name").value.trim();
  if(name === ""){
    alert("Please enter your name");
    return;
  }

  document.getElementById("app").innerHTML = `
    <h1>Do you love me, ${name}? 💕</h1>
    <button class="yes" id="yesBtn">YES 💖</button>
    <button class="no" id="noBtn">NO 😅</button>
  `;

  document.getElementById("yesBtn").addEventListener("click", function(){
    document.getElementById("app").innerHTML = `<h1>💖 Yesss ${name}, I knew it 💖</h1>`;
  });

  var noBtn = document.getElementById("noBtn");
  noBtn.addEventListener("mouseover", moveNo);
  noBtn.addEventListener("touchstart", moveNo);
}

function moveNo(){
  var noBtn = document.getElementById("noBtn");
  noBtn.style.position = "fixed";
  noBtn.style.left = Math.random() * 80 + "%";
  noBtn.style.top = Math.random() * 80 + "%";
}
</script>
</body>
</html>
