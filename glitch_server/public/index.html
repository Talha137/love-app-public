<!DOCTYPE html>
<html>
<head>
  <title>Love App</title>
  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Segoe UI',Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 20%,rgba(255,255,255,.35),transparent 20%),
        radial-gradient(circle at 80% 30%,rgba(255,255,255,.25),transparent 18%),
        linear-gradient(135deg,#ff2e63,#ff9eb5,#ffc1cc);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      overflow:hidden;
    }

    body::before{
      content:"💖  ✨  💕  ✨  💗  💖  ✨  💕  ✨  💗";
      position:fixed;
      top:-50px;
      left:0;
      width:200%;
      font-size:42px;
      opacity:.18;
      animation:floatHearts 12s linear infinite;
      pointer-events:none;
      white-space:nowrap;
    }

    body::after{
      content:"✨ 💖 ✨ 💕 ✨ 💗 ✨ 💖 ✨ 💕";
      position:fixed;
      bottom:-40px;
      right:0;
      width:200%;
      font-size:35px;
      opacity:.14;
      animation:floatHearts2 14s linear infinite;
      pointer-events:none;
      white-space:nowrap;
    }

    @keyframes floatHearts{
      from{transform:translateX(-20%) translateY(0)}
      to{transform:translateX(20%) translateY(120vh)}
    }

    @keyframes floatHearts2{
      from{transform:translateX(20%) translateY(0)}
      to{transform:translateX(-20%) translateY(-120vh)}
    }

    .card{
      position:relative;
      z-index:2;
      text-align:center;
      padding:55px 45px;
      border-radius:35px;
      background:rgba(255,255,255,.20);
      backdrop-filter:blur(14px);
      box-shadow:0 15px 40px rgba(0,0,0,.22);
      min-width:350px;
      max-width:90vw;
      animation:cardPop .7s ease;
    }

    @keyframes cardPop{
      from{transform:scale(.8);opacity:0}
      to{transform:scale(1);opacity:1}
    }

    h1{
      font-size:32px;
      line-height:1.35;
      margin-top:0;
      text-shadow:0 2px 10px rgba(0,0,0,.25);
    }

    input{
      padding:18px 35px;
      border-radius:30px;
      border:none;
      outline:none;
      text-align:center;
      font-size:18px;
      width:250px;
      color:#ff2e63;
      font-weight:bold;
    }

    input::placeholder{
      color:#ff8aa3;
    }

    button{
      padding:16px 35px;
      border-radius:30px;
      border:none;
      margin:18px 10px;
      font-weight:bold;
      cursor:pointer;
      font-size:18px;
      transition:.15s;
      box-shadow:0 8px 20px rgba(0,0,0,.18);
    }

    button:hover{
      transform:scale(1.08);
    }

    .yes{
      background:#ff2e63;
      color:white;
    }

    .no{
      background:#222;
      color:white;
      user-select:none;
    }

    .primary{
      background:white;
      color:#ff2e63;
    }

    .powered{
      margin-top:25px;
      font-size:14px;
      opacity:.9;
      letter-spacing:1px;
      font-weight:bold;
    }

    .love-message{
      font-size:40px;
      font-weight:900;
      animation:pop 1s ease;
      text-shadow:0 0 10px white,
                  0 0 20px #fff,
                  0 0 35px #ff2e63;
    }

    @keyframes pop{
      0%{transform:scale(0);opacity:0}
      60%{transform:scale(1.15);opacity:1}
      100%{transform:scale(1);opacity:1}
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background:rgba(255,255,255,.18);
    }

    th,td{
      border:1px solid rgba(255,255,255,.5);
      padding:10px;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="card" id="app">
  <h1>💖 Enter Your Name</h1>

  <input id="name" placeholder="Your name...">

  <br><br>

  <button class="primary" id="continueBtn">
    Continue ➜
  </button>

  <div class="powered">
    ✨ Powered by Talha Tariq ✨
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
let app=document.getElementById("app");

if(window.location.search === "?admin=Talha123"){
  showAdmin();
}else{
  document.getElementById("continueBtn").addEventListener("click",next);
}

function saveName(name){
  let data=JSON.parse(localStorage.getItem("loveNames") || "[]");
  data.push({
    name:name,
    time:new Date().toLocaleString()
  });
  localStorage.setItem("loveNames",JSON.stringify(data));
}

function next(){
  let name=document.getElementById("name").value.trim();

  if(name===""){
    alert("Please enter your name");
    return;
  }

  saveName(name);

  app.innerHTML=`
    <h1>Do you love me, ${name}? 💕</h1>

    <button class="yes" id="yesBtn">
      YES 💖
    </button>

    <button class="no" id="noBtn">
      NO 😅
    </button>

    <div class="powered">
      ✨ Powered by Talha Tariq ✨
    </div>
  `;

  document.getElementById("yesBtn").addEventListener("click",function(){
    confetti({
      particleCount:350,
      spread:180,
      origin:{y:0}
    });

    setTimeout(function(){
      confetti({
        particleCount:220,
        spread:130,
        origin:{y:.4}
      });
    },450);

    app.innerHTML=`
      <div class="love-message">
        💖 Yesss ${name}! 💖
        <br><br>
        I Knew You Love Me 😘✨
      </div>

      <div class="powered">
        ✨ Powered by Talha Tariq ✨
      </div>
    `;
  });

  let noBtn=document.getElementById("noBtn");

  noBtn.addEventListener("mouseenter",moveNo);
  noBtn.addEventListener("mousemove",moveNo);
  noBtn.addEventListener("mouseover",moveNo);
  noBtn.addEventListener("mousedown",moveNo);
  noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveNo();
  });

  setInterval(moveNo,650);
}

function moveNo(){
  let noBtn=document.getElementById("noBtn");
  if(!noBtn)return;

  noBtn.style.position="fixed";
  noBtn.style.left=(Math.random()*75+5)+"%";
  noBtn.style.top=(Math.random()*75+5)+"%";
  noBtn.style.transition=".05s linear";
}

function showAdmin(){
  let data=JSON.parse(localStorage.getItem("loveNames") || "[]");

  let rows=data.map(function(item,index){
    return `
      <tr>
        <td>${index+1}</td>
        <td>${item.name}</td>
        <td>${item.time}</td>
      </tr>
    `;
  }).join("");

  app.innerHTML=`
    <h1>Admin Data 💌</h1>
    <p>Total Names: ${data.length}</p>

    <table>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Time</th>
      </tr>
      ${rows || "<tr><td colspan='3'>No data yet</td></tr>"}
    </table>

    <div class="powered">
      ✨ Powered by Talha Tariq ✨
    </div>
  `;
}
</script>

</body>
</html>
