<!DOCTYPE html>
<html>
<head>
  <title>Love App</title>
  <style>
    body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff4d6d,#ffb6c1);height:100vh;display:flex;justify-content:center;align-items:center;color:white}
    .card{text-align:center;padding:40px;border-radius:25px;background:rgba(255,255,255,.18);box-shadow:0 10px 30px rgba(0,0,0,.2)}
    input{padding:14px;border-radius:30px;border:0;text-align:center}
    button{padding:12px 22px;border-radius:30px;border:0;margin:8px;font-weight:bold;cursor:pointer}
    .yes{background:#ff2e63;color:white}.no{background:#333;color:white}.primary{color:#ff2e63}
  </style>
</head>
<body>
  <div class="card" id="app">
    <h1>💖 Enter Your Name</h1>
    <input id="name" placeholder="Your name..." />
    <br><br>
    <button class="primary" onclick="next()">Continue ➜</button>
  </div>

<script>
function next(){
  var name=document.getElementById("name").value.trim();
  if(!name)return;
  document.getElementById("app").innerHTML=
    '<h1>Do you love me, '+name+'? 💕</h1><button class="yes" onclick="yes(\\''+name+'\\')">YES 💖</button><button id="no" class="no">NO 😅</button>';
  var no=document.getElementById("no");
  no.onmouseover=no.ontouchstart=function(){
    no.style.position="fixed";
    no.style.left=Math.random()*80+"%";
    no.style.top=Math.random()*80+"%";
  };
}
function yes(name){
  document.getElementById("app").innerHTML='<h1>💖 Yesss '+name+', I knew it 💖</h1>';
}
</script>
</body>
</html>
