<!DOCTYPE html>
<html>
<head>
  <title>Love App</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#ff2e63,#ff8fab,#ffc2d1);height:100vh;display:flex;justify-content:center;align-items:center;color:white;overflow:hidden}
    .heart-bg span{position:fixed;color:rgba(255,255,255,.17);font-size:140px;text-shadow:0 18px 45px rgba(120,0,50,.28);animation:float 8s ease-in-out infinite}
    .heart-bg span:nth-child(1){left:5%;top:8%}.heart-bg span:nth-child(2){right:8%;top:12%;font-size:170px}.heart-bg span:nth-child(3){left:10%;bottom:8%;font-size:160px}.heart-bg span:nth-child(4){right:12%;bottom:10%}.heart-bg span:nth-child(5){left:45%;top:5%;font-size:120px}
    @keyframes float{50%{transform:translateY(-25px) scale(1.06)}}
    .card{position:relative;z-index:2;text-align:center;padding:55px 45px;border-radius:35px;background:rgba(255,255,255,.22);backdrop-filter:blur(14px);box-shadow:0 18px 45px rgba(0,0,0,.22);min-width:350px;max-width:90vw}
    h1{font-size:32px;text-shadow:0 3px 10px rgba(120,0,50,.35)}
    input{padding:18px 35px;border-radius:30px;border:none;outline:none;text-align:center;font-size:18px;width:250px;color:#ff2e63;font-weight:bold}
    button{padding:16px 38px;border-radius:30px;border:none;font-weight:bold;cursor:pointer;font-size:18px;transition:.18s;box-shadow:0 8px 20px rgba(0,0,0,.20);margin:16px 10px}
    .primary{background:white;color:#ff2e63}.yes{background:#ff2e63;color:white}.no{background:#222;color:white;user-select:none;z-index:9999}
    .btn-row{display:flex;justify-content:center;align-items:center;gap:18px;min-height:90px;position:relative}
    .powered{margin-top:25px;font-size:14px;opacity:.9;letter-spacing:1px;font-weight:bold}
    .love-message{font-size:38px;font-weight:900;color:white;text-shadow:0 3px 8px rgba(100,0,45,.45),0 0 8px rgba(255,46,99,.55)}
    table{width:100%;border-collapse:collapse;margin-top:20px;background:rgba(255,255,255,.18)}th,td{border:1px solid rgba(255,255,255,.5);padding:10px;font-size:14px}
  </style>
</head>
<body>

<div class="heart-bg"><span>♥</span><span>♥</span><span>♥</span><span>♥</span><span>♥</span></div>

<div class="card" id="app">
  <h1>💖 Enter Your Name</h1>
  <input id="name" placeholder="Your name...">
  <br>
  <button class="primary" id="continueBtn">Continue ➜</button>
  <div class="powered">✨ Powered by Software Engineer ✨</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
const SUPABASE_URL = "https://bczjmurcvoiiftqtvkia.supabase.co";
const SUPABASE_KEY = "sb_publishable_wkVI-obT0GYZncKQAdY1wg_hKSXMUTB";
const TABLE_NAME = "Love table";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let app = document.getElementById("app");

if(window.location.search === "?admin=Talha123"){
  showAdmin();
}else{
  document.getElementById("continueBtn").addEventListener("click", next);
}

async function saveData(name, answer){
  await db.from(TABLE_NAME).insert([{ name:name, answer:answer }]);
}

async function next(){
  let name=document.getElementById("name").value.trim();
  if(name===""){alert("Please enter your name");return;}

  await saveData(name,"Name Entered");

  app.innerHTML=`
    <h1>Do you love me, ${name}? 💕</h1>
    <div class="btn-row">
      <button class="yes" id="yesBtn">YES 💖</button>
      <button class="no" id="noBtn">NO 😅</button>
    </div>
    <div class="powered">✨ Powered by Software Engineer ✨</div>
  `;

  document.getElementById("yesBtn").addEventListener("click", async function(){
    await saveData(name,"YES");

    confetti({particleCount:350,spread:180,origin:{y:0}});
    setTimeout(()=>confetti({particleCount:220,spread:130,origin:{y:.4}}),450);

    app.innerHTML=`
      <div class="love-message">
        💖 Yesss ${name}! 💖
        <br><br>
        I Knew You Love Me 😘✨
      </div>
      <div class="powered">✨ Powered by Software Engineer ✨</div>
    `;
  });

  let noBtn=document.getElementById("noBtn");

  noBtn.addEventListener("mouseenter",moveNo);
  noBtn.addEventListener("mouseover",moveNo);
  noBtn.addEventListener("mousemove",moveNo);
  noBtn.addEventListener("mousedown",moveNo);
  noBtn.addEventListener("click",moveNo);
  noBtn.addEventListener("touchstart",function(e){e.preventDefault();moveNo();});

  document.addEventListener("mousemove",detectNearNo);
}

function detectNearNo(e){
  let noBtn=document.getElementById("noBtn");
  if(!noBtn)return;

  let rect=noBtn.getBoundingClientRect();
  let centerX=rect.left+rect.width/2;
  let centerY=rect.top+rect.height/2;
  let distance=Math.hypot(e.clientX-centerX,e.clientY-centerY);

  if(distance<130){
    moveNo();
  }
}

function moveNo(){
  let noBtn=document.getElementById("noBtn");
  let yesBtn=document.getElementById("yesBtn");
  let card=document.getElementById("app");

  if(!noBtn || !yesBtn || !card)return;

  let cardRect=card.getBoundingClientRect();
  let yesRect=yesBtn.getBoundingClientRect();

  let btnW=noBtn.offsetWidth;
  let btnH=noBtn.offsetHeight;

  let x,y,safe=false;

  for(let i=0;i<80;i++){
    x=cardRect.left + 20 + Math.random()*(cardRect.width-btnW-40);
    y=cardRect.top + 85 + Math.random()*(cardRect.height-btnH-140);

    safe = (
      x + btnW < yesRect.left - 15 ||
      x > yesRect.right + 15 ||
      y + btnH < yesRect.top - 15 ||
      y > yesRect.bottom + 15
    );

    if(safe)break;
  }

  noBtn.style.position="fixed";
  noBtn.style.left=x+"px";
  noBtn.style.top=y+"px";
  noBtn.style.transition=".010s linear";
}

async function showAdmin(){
  const { data, error } = await db
    .from(Love table)
    .select("*")
    .order("created_at",{ascending:false});

  if(error){
    app.innerHTML="<h1>Database Error</h1><p>"+error.message+"</p>";
    return;
  }

  let rows=data.map((item,index)=>`
    <tr>
      <td>${index+1}</td>
      <td>${item.name || ""}</td>
      <td>${item.answer || ""}</td>
      <td>${new Date(item.created_at).toLocaleString()}</td>
    </tr>
  `).join("");

  app.innerHTML=`
    <h1>Admin Data 💌</h1>
    <p>Total Records: ${data.length}</p>
    <table>
      <tr><th>#</th><th>Name</th><th>Answer</th><th>Time</th></tr>
      ${rows || "<tr><td colspan='4'>No data yet</td></tr>"}
    </table>
    <div class="powered">✨ Powered by Software Engineer ✨</div>
  `;
}
</script>

</body>
</html>
