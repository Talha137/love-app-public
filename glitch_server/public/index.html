<!DOCTYPE html>
<html>
<head>
  <title>Love App</title>
  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Segoe UI',Arial,sans-serif;
      background:linear-gradient(135deg,#ff2e63,#ff8fab,#ffc2d1);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      overflow:hidden;
      position:relative;
    }

    .heart-bg{
      position:fixed;
      inset:0;
      overflow:hidden;
      pointer-events:none;
      z-index:0;
    }

    .heart-bg span{
      position:absolute;
      color:rgba(255,255,255,.18);
      font-size:120px;
      text-shadow:0 18px 45px rgba(180,0,70,.25);
      animation:slowFloat 12s ease-in-out infinite;
    }

    .heart-bg span:nth-child(1){left:5%;top:10%;font-size:150px}
    .heart-bg span:nth-child(2){right:7%;top:8%;font-size:130px;animation-delay:1s}
    .heart-bg span:nth-child(3){left:12%;bottom:8%;font-size:110px;animation-delay:2s}
    .heart-bg span:nth-child(4){right:14%;bottom:10%;font-size:160px;animation-delay:3s}
    .heart-bg span:nth-child(5){left:43%;top:4%;font-size:95px;animation-delay:1.5s}
    .heart-bg span:nth-child(6){left:45%;bottom:2%;font-size:125px;animation-delay:2.5s}

    @keyframes slowFloat{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-25px) scale(1.05)}
    }

    .card{
      position:relative;
      z-index:2;
      text-align:center;
      padding:55px 45px;
      border-radius:35px;
      background:rgba(255,255,255,.22);
      backdrop-filter:blur(14px);
      box-shadow:0 18px 45px rgba(0,0,0,.22);
      min-width:350px;
      max-width:90vw;
      animation:cardPop .7s ease;
    }

    @keyframes cardPop{
      from{transform:scale(.8);opacity:0}
      to{transform:scale(1);opacity:1}
    }

    h1{
      font-size:32px;
      line-height:1.35;
      margin-top:0;
      text-shadow:0 3px 10px rgba(120,0,50,.35);
    }

    input{
      padding:18px 35px;
      border-radius:30px;
      border:none;
      outline:none;
      text-align:center;
      font-size:18px;
      width:250px;
      color:#ff2e63;
      font-weight:bold;
      box-shadow:0 8px 20px rgba(0,0,0,.14);
    }

    input::placeholder{
      color:#ff8aa3;
    }

    .btn-row{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:18px;
      margin-top:20px;
      min-height:80px;
    }

    button{
      padding:16px 38px;
      border-radius:30px;
      border:none;
      font-weight:bold;
      cursor:pointer;
      font-size:18px;
      transition:.18s ease;
      box-shadow:0 8px 20px rgba(0,0,0,.20);
    }

    button:hover{
      transform:scale(1.06);
    }

    .yes{
      background:#ff2e63;
      color:white;
    }

    .no{
      background:#222;
      color:white;
      user-select:none;
      position:relative;
    }

    .primary{
      background:white;
      color:#ff2e63;
      margin-top:18px;
    }

    .powered{
      margin-top:25px;
      font-size:14px;
      opacity:.9;
      letter-spacing:1px;
      font-weight:bold;
    }

    .love-message{
      font-size:38px;
      font-weight:900;
      color:#fff;
      animation:pop 1s ease;
      text-shadow:
        0 3px 8px rgba(100,0,45,.45),
        0 0 8px rgba(255,46,99,.55);
    }

    @keyframes pop{
      0%{transform:scale(0);opacity:0}
      60%{transform:scale(1.12);opacity:1}
      100%{transform:scale(1);opacity:1}
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background:rgba(255,255,255,.18);
    }

    th,td{
      border:1px solid rgba(255,255,255,.5);
      padding:10px;
      font-size:14px;
    }
  </style>
</head>
<body>

<div class="heart-bg">
  <span>♥</span>
  <span>♥</span>
  <span>♥</span>
  <span>♥</span>
  <span>♥</span>
  <span>♥</span>
</div>

<div class="card" id="app">
  <h1>💖 Enter Your Name</h1>

  <input id="name" placeholder="Your name...">

  <br>

  <button class="primary" id="continueBtn">
    Continue ➜
  </button>

  <div class="powered">
    ✨ Powered by Talha Tariq ✨
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
let app=document.getElementById("app");

if(window.location.search === "?admin=Talha123"){
  showAdmin();
}else{
  document.getElementById("continueBtn").addEventListener("click",next);
}

function saveName(name){
  let data=JSON.parse(localStorage.getItem("loveNames") || "[]");
  data.push({
    name:name,
    time:new Date().toLocaleString()
  });
  localStorage.setItem("loveNames",JSON.stringify(data));
}

function next(){
  let name=document.getElementById("name").value.trim();

  if(name===""){
    alert("Please enter your name");
    return;
  }

  saveName(name);

  app.innerHTML=`
    <h1>Do you love me, ${name}? 💕</h1>

    <div class="btn-row">
      <button class="yes" id="yesBtn">
        YES 💖
      </button>

      <button class="no" id="noBtn">
        NO 😅
      </button>
    </div>

    <div class="powered">
      ✨ Powered by Talha Tariq ✨
    </div>
  `;

  document.getElementById("yesBtn").addEventListener("click",function(){
    confetti({
      particleCount:350,
      spread:180,
      origin:{y:0}
    });

    setTimeout(function(){
      confetti({
        particleCount:220,
        spread:130,
        origin:{y:.4}
      });
    },450);

    app.innerHTML=`
      <div class="love-message">
        💖 Yesss ${name}! 💖
        <br><br>
        I Knew You Love Me 😘✨
      </div>

      <div class="powered">
        ✨ Powered by Talha Tariq ✨
      </div>
    `;
  });

  let noBtn=document.getElementById("noBtn");

  noBtn.addEventListener("click",moveNo);
  noBtn.addEventListener("mousedown",moveNo);
  noBtn.addEventListener("touchstart",function(e){
    e.preventDefault();
    moveNo();
  });
}

function moveNo(){
  let noBtn=document.getElementById("noBtn");
  if(!noBtn)return;

  noBtn.style.position="fixed";
  noBtn.style.left=(Math.random()*75+8)+"%";
  noBtn.style.top=(Math.random()*70+10)+"%";
  noBtn.style.transition=".03s linear";
}

function showAdmin(){
  let data=JSON.parse(localStorage.getItem("loveNames") || "[]");

  let rows=data.map(function(item,index){
    return `
      <tr>
        <td>${index+1}</td>
        <td>${item.name}</td>
        <td>${item.time}</td>
      </tr>
    `;
  }).join("");

  app.innerHTML=`
    <h1>Admin Data 💌</h1>
    <p>Total Names: ${data.length}</p>

    <table>
      <tr>
        <th>#</th>
        <th>Name</th>
        <th>Time</th>
      </tr>
      ${rows || "<tr><td colspan='3'>No data yet</td></tr>"}
    </table>

    <div class="powered">
      ✨ Powered by Talha Tariq ✨
    </div>
  `;
}
</script>

</body>
</html>
